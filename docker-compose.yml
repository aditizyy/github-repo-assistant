version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: repo_assistant
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p%MYSQL_ROOT_PASSWORD%"]
      interval: 10s
      retries: 5

  backend:
    build: .
    command: uvicorn backend.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - ./cloned_repos:/app/cloned_repos
      - ./faiss_indexes:/app/faiss_indexes
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: