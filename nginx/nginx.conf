# nginx/nginx.conf — Reverse proxy for the production stack.
#
# Scope: HTTP only for now. Add TLS/SSL once you have a real domain and
# certificate (e.g. via Let's Encrypt / certbot) — don't fake SSL config
# with placeholder cert paths, since nginx will fail to start without
# real files at those paths.

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # General API traffic: 30 requests/minute per IP.
    # AI-heavy endpoints (chat/docs/analysis — anything that calls Gemini or
    # does real CPU work): 10 requests/minute per IP, since these are
    # expensive calls you don't want hammered.
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m       rate=10r/m;

    upstream fastapi {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ── AI-heavy endpoints (stricter rate limit) ────────────────────────
        location ~ ^/api/(chat|docs|analysis) {
            limit_req zone=ai burst=5 nodelay;

            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # CRITICAL for the streaming /chat/{id}/stream endpoint: SSE
            # requires buffering OFF, or Nginx will wait for the full
            # response before forwarding anything, which defeats streaming
            # entirely and makes it look identical to non-streaming.
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
        }

        # ── General API traffic ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=10 nodelay;

            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Health check passthrough (no rate limit — orchestrators poll this) ──
        location /health {
            proxy_pass http://fastapi;
        }

        location / {
            return 404;
        }
    }
}
